<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Club Intelligence — Valore Atteso</title>
<style>
  :root{
    --bg:#0A0B0F; --bg2:#10121A; --panel:#14161F; --panel2:#181B26;
    --line:#232735; --line2:#2E3344;
    --txt:#E7EAF2; --txt2:#9BA2B4; --txt3:#5C6478;
    --inter-blue:#0099E5; --inter-navy:#0A1A4A; --inter-cyan:#19E0C8;
    --gold:#E8C87A; --red:#FF5C6C; --green:#2BD9A0;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(0,153,229,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(25,224,200,.06), transparent 55%),
      var(--bg);
    color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  ::selection{background:var(--inter-blue);color:#000}
  a{color:inherit;text-decoration:none}

  /* ── Layout ── */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* ── Sidebar ── */
  .side{
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-right:1px solid var(--line);
    padding:22px 16px; position:sticky; top:0; height:100vh;
    display:flex; flex-direction:column; gap:6px;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
  .brand-mark{
    width:34px;height:34px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--inter-blue),var(--inter-cyan));
    display:grid;place-items:center;font-weight:800;font-size:15px;color:#04121f;
    box-shadow:0 0 0 1px rgba(255,255,255,.06),0 8px 22px rgba(0,153,229,.30);
  }
  .brand-name{font-weight:700;font-size:14.5px;letter-spacing:-.2px}
  .brand-sub{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}

  .nav-label{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;padding:14px 10px 6px}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;
    color:var(--txt2);font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;
  }
  .nav-item:hover{background:var(--panel);color:var(--txt)}
  .nav-item.active{background:linear-gradient(90deg,rgba(0,153,229,.16),rgba(0,153,229,.02));color:#fff;box-shadow:inset 2px 0 0 var(--inter-blue)}
  .nav-item .ic{width:17px;height:17px;flex:none;opacity:.85}
  .nav-item .mini-crest{width:20px;height:20px;flex:none;border-radius:6px}
  .nav-item.soon{opacity:.4;cursor:not-allowed}
  .nav-item.soon::after{content:'PRESTO';font-family:var(--mono);font-size:8px;letter-spacing:.1em;margin-left:auto;color:var(--txt3);border:1px solid var(--line2);padding:1px 5px;border-radius:5px}

  .side-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:14px}
  .club-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .club-chip .badge{width:26px;height:26px;flex:none}

  /* ── Main ── */
  .main{padding:0 0 60px}
  .topbar{
    position:sticky;top:0;z-index:20;
    background:rgba(10,11,15,.72);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    padding:16px 34px;display:flex;align-items:center;gap:18px;
  }
  .crest{width:46px;height:46px;flex:none;filter:drop-shadow(0 4px 14px rgba(0,153,229,.35))}
  .club-h1{font-size:21px;font-weight:750;letter-spacing:-.4px;line-height:1.05}
  .club-meta{font-family:var(--mono);font-size:10px;color:var(--txt2);letter-spacing:.06em;margin-top:3px;display:flex;gap:14px;flex-wrap:wrap}
  .club-meta b{color:var(--inter-cyan);font-weight:600}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .season-pick{
    display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line2);
    border-radius:9px;padding:8px 13px;font-family:var(--mono);font-size:12px;color:var(--txt);cursor:default
  }
  .season-pick b{color:var(--inter-blue)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(43,217,160,.18);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}

  .wrap{padding:30px 34px;max-width:1180px}

  /* ── Intro / what-is ── */
  .intro{
    position:relative;overflow:hidden;
    background:linear-gradient(120deg,rgba(10,26,74,.55),rgba(20,22,31,.4));
    border:1px solid var(--line2);border-radius:18px;padding:26px 28px;margin-bottom:26px;
  }
  .intro::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;
    background:radial-gradient(circle,rgba(0,153,229,.22),transparent 70%);pointer-events:none}
  .intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--inter-cyan);text-transform:uppercase;margin-bottom:10px}
  .intro h2{font-size:23px;font-weight:760;letter-spacing:-.6px;line-height:1.18;max-width:660px;margin-bottom:12px}
  .intro h2 .hl{background:linear-gradient(90deg,var(--inter-blue),var(--inter-cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .intro p{color:var(--txt2);font-size:14px;line-height:1.65;max-width:600px}
  .intro-steps{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .step{flex:1;min-width:150px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .step .n{font-family:var(--mono);font-size:10px;color:var(--inter-blue);letter-spacing:.1em}
  .step .t{font-weight:650;font-size:13px;margin:6px 0 4px}
  .step .d{font-size:11.5px;color:var(--txt3);line-height:1.5}

  /* ── Section label ── */
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--txt3);text-transform:uppercase;margin:30px 2px 14px;display:flex;align-items:center;gap:10px}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--line)}

  /* ── KPI grid ── */
  .kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:14px;padding:17px 17px 15px;position:relative;overflow:hidden;
    transition:.18s;cursor:default;
  }
  .kpi:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .kpi::after{content:'';position:absolute;left:0;top:0;width:100%;height:2px;background:var(--accent,var(--inter-blue));opacity:.7}
  .kpi .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--txt3);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:27px;font-weight:780;letter-spacing:-1px;margin:11px 0 3px;font-feature-settings:'tnum'}
  .kpi .sub{font-size:11px;color:var(--txt2)}
  .delta{font-family:var(--mono);font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px;margin-top:9px;padding:2px 7px;border-radius:6px}
  .delta.up{color:var(--green);background:rgba(43,217,160,.10)}
  .delta.down{color:var(--red);background:rgba(255,92,108,.10)}
  .delta.flat{color:var(--txt2);background:rgba(155,162,180,.10)}
  .src{position:absolute;right:11px;top:13px;width:15px;height:15px;border-radius:50%;border:1px solid var(--line2);
    display:grid;place-items:center;font-family:var(--mono);font-size:9px;color:var(--txt3);cursor:help}
  .src:hover{border-color:var(--inter-blue);color:var(--inter-blue)}
  .src .tip{
    position:absolute;right:0;top:22px;width:210px;background:#05060a;border:1px solid var(--line2);
    border-radius:8px;padding:9px 11px;font-family:var(--sans);font-size:10.5px;color:var(--txt2);line-height:1.5;
    opacity:0;pointer-events:none;transform:translateY(-4px);transition:.15s;z-index:30;text-align:left;font-weight:400
  }
  .src:hover .tip{opacity:1;transform:translateY(0)}
  .src .tip b{color:var(--inter-cyan)}
  .nd{color:var(--txt3);font-style:italic;font-weight:500}

  /* ── Panels row ── */
  .row{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:16px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:20px 22px}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .card-h h3{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
  .card-h .hint{font-family:var(--mono);font-size:9.5px;color:var(--txt3);letter-spacing:.06em}
  .card-sub{font-size:11.5px;color:var(--txt3);margin-bottom:18px}

  /* ── Revenue split bars ── */
  .split{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .split-row{display:flex;align-items:center;gap:11px}
  .split-row .k{font-size:12px;color:var(--txt2);width:138px;flex:none}
  .split-row .bar{flex:1;height:8px;background:var(--bg);border-radius:5px;overflow:hidden}
  .split-row .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--inter-navy),var(--inter-blue))}
  .split-row .v{font-family:var(--mono);font-size:11.5px;color:var(--txt);width:64px;text-align:right;flex:none}

  /* ── P&L table ── */
  .pnl{width:100%;border-collapse:collapse;margin-top:4px}
  .pnl td{padding:11px 6px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  .pnl td.lbl{color:var(--txt2)}
  .pnl td.amt{text-align:right;font-family:var(--mono);font-size:13px;color:var(--txt);font-feature-settings:'tnum';white-space:nowrap}
  .pnl tr.sub td{font-size:11.5px;color:var(--txt3);padding:6px 6px 6px 24px;border-bottom:none}
  .pnl tr.sub td.amt{color:var(--txt2)}
  .pnl tr.total td{font-weight:750;color:#fff;font-size:14px;border-top:1px solid var(--line2);border-bottom:none;padding-top:13px}
  .pnl .neg{color:var(--red)}
  .pnl .pos{color:var(--green)}

  /* ── Margin cascade ── */
  .casc{display:flex;flex-direction:column;gap:13px;margin-top:6px}
  .casc-row .ct{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .casc-row .ct .cn{color:var(--txt2);font-weight:600}
  .casc-row .ct .cv{font-family:var(--mono);font-size:12.5px}
  .casc-row .ctrack{height:9px;background:var(--bg);border-radius:5px;overflow:hidden}
  .casc-row .cfill{height:100%;border-radius:5px}

  /* ── Gauges ── */
  .gauges{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .gauge{text-align:center}
  .gauge .ring{position:relative;width:128px;height:128px;margin:0 auto 8px}
  .gauge .ringval{position:absolute;inset:0;display:grid;place-content:center}
  .gauge .ringval .big{font-size:25px;font-weight:780;letter-spacing:-1px}
  .gauge .ringval .lim{font-family:var(--mono);font-size:9px;color:var(--txt3)}
  .gauge .gl{font-size:12.5px;font-weight:600;margin-top:2px}
  .gauge .gd{font-size:10.5px;color:var(--txt3);margin-top:3px;line-height:1.4}
  .status-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:3px 8px;border-radius:6px;margin-top:8px;text-transform:uppercase}
  .status-pill.ok{color:var(--green);background:rgba(43,217,160,.12)}
  .status-pill.warn{color:var(--gold);background:rgba(232,200,122,.12)}
  .status-pill.bad{color:var(--red);background:rgba(255,92,108,.12)}

  .statline{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  .stat{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:14px}
  .stat .sl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
  .stat .sv{font-size:19px;font-weight:740;letter-spacing:-.5px;margin-top:7px;font-feature-settings:'tnum'}
  .stat .sd{font-size:10.5px;color:var(--txt3);margin-top:4px;line-height:1.4}

  /* ── Peer table ── */
  .ptable{width:100%;border-collapse:collapse;margin-top:8px}
  .ptable th{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);text-align:right;padding:10px 8px;font-weight:500}
  .ptable th:first-child{text-align:left}
  .ptable td{padding:14px 8px;border-top:1px solid var(--line);font-family:var(--mono);font-size:13.5px;text-align:right;color:var(--txt2);font-feature-settings:'tnum'}
  .ptable td:first-child{text-align:left;font-family:var(--sans);font-weight:650;color:var(--txt);font-size:13.5px}
  .ptable .mini{width:17px;height:17px;border-radius:5px;display:inline-block;vertical-align:middle;margin-right:9px}
  .ptable .lead{color:var(--inter-cyan);font-weight:700}

  /* ── Peer bars ── */
  .peer{display:flex;flex-direction:column;gap:13px;margin-top:4px}
  .peer-row{display:grid;grid-template-columns:120px 1fr 70px;align-items:center;gap:12px}
  .peer-row .club{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600}
  .peer-row .club .mini{width:18px;height:18px;border-radius:5px;flex:none}
  .peer-row .track{height:24px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
  .peer-row .pf{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--mono);font-size:10px;color:#04121f;font-weight:700;background:linear-gradient(90deg,#3a3f52,#525872)}
  .peer-row.me .pf{background:linear-gradient(90deg,var(--inter-blue),var(--inter-cyan))}
  .peer-row .num{font-family:var(--mono);font-size:12px;text-align:right;color:var(--txt2)}
  .peer-row.me .num{color:var(--inter-cyan);font-weight:700}

  /* ── Deal cards ── */
  .deals{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
  .deal{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:16px 17px;transition:.16s}
  .deal:hover{border-color:var(--line2)}
  .deal .dt{font-family:var(--mono);font-size:9px;color:var(--inter-cyan);letter-spacing:.1em;text-transform:uppercase}
  .deal .dh{font-size:14px;font-weight:680;margin:8px 0 6px;letter-spacing:-.2px;line-height:1.3}
  .deal .dd{font-size:11.5px;color:var(--txt3);line-height:1.55}
  .deal .dv{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:11px;color:var(--gold)}

  /* ── Term sheet ── */
  .terms{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:6px}
  .terms .cell{padding:13px 16px;border-bottom:1px solid var(--line)}
  .terms .cell:nth-child(odd){border-right:1px solid var(--line)}
  .terms .tk{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
  .terms .tv{font-size:14px;font-weight:600;margin-top:5px}

  /* ── Jump cards ── */
  .jumpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  .jump{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:17px 18px;cursor:pointer;transition:.18s}
  .jump:hover{border-color:var(--inter-blue);transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.35)}
  .jump .jt{font-weight:680;font-size:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .jump .jt .arr{color:var(--inter-blue);font-size:16px}
  .jump .jd{font-size:11.5px;color:var(--txt3);line-height:1.5}

  .footnote{margin-top:34px;padding:14px 18px;background:rgba(43,217,160,.06);border:1px solid rgba(43,217,160,.2);border-radius:11px;font-size:11.5px;color:var(--txt2);line-height:1.6}
  .footnote b{color:var(--green)}
  .footnote.warn{background:rgba(232,200,122,.06);border-color:rgba(232,200,122,.2)}
  .footnote.warn b{color:var(--gold)}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);padding:0 34px;overflow-x:auto}
  .tab{padding:13px 16px;font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px;white-space:nowrap}
  .tab:hover{color:var(--txt2)}
  .tab.active{color:#fff;border-bottom-color:var(--inter-blue)}

  #stage{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  @media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.kgrid{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr!important}.deals,.gauges,.terms{grid-template-columns:1fr}.jumpgrid{grid-template-columns:1fr}.statline{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

  <!-- ════ SIDEBAR ════ -->
  <aside class="side">
    <a class="brand" href="/" title="Torna a Valore Atteso">
      <div class="brand-mark">VΛ</div>
      <div>
        <div class="brand-name">Club Intelligence</div>
        <div class="brand-sub">by Valore Atteso</div>
      </div>
    </a>

    <div class="nav-label">Club coperti</div>
    <div id="clubNav"></div>

    <div class="nav-label">In arrivo</div>
    <div class="nav-item soon">Milan</div>
    <div class="nav-item soon">Napoli</div>
    <div class="nav-item soon">Roma</div>

    <div class="side-foot">
      <div class="club-chip" id="clubChip"></div>
    </div>
  </aside>

  <!-- ════ MAIN ════ -->
  <main class="main">
    <div class="topbar" id="topbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="wrap"><div id="stage"></div></div>
  </main>
</div>

<script>

  },
  juventus: {

const VIEWS = [
  ['panoramica','Panoramica'],
  ['conto','Conto economico'],
  ['sostenibilita','Sostenibilità'],
  ['peer','Confronto peer'],
  ['deal','Deal & Bond']
];

let cur = 'inter';
let view = 'panoramica';

/* ── helpers ── */
function num(v,maxDec){ if(v==null) return null;
  return Number(v).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:(maxDec==null?1:maxDec)}); }
function eur(v){ return v==null ? '<span class="nd">n/d</span>' : '€'+num(v)+'M'; }
function eurSigned(v){ if(v==null) return '<span class="nd">n/d</span>';
  const sign = v>0?'+':(v<0?'−':''); const col = v>0?'var(--green)':(v<0?'var(--red)':'var(--txt)');
  return '<span style="color:'+col+'">'+sign+'€'+num(Math.abs(v))+'M</span>'; }
function pct(v){ return v==null ? '<span class="nd">n/d</span>' : num(v)+'%'; }
function intnum(v){ return Number(v).toLocaleString('it-IT'); }

function crestSVG(c, size){
  size = size||46;
  return '<svg class="crest" style="width:'+size+'px;height:'+size+'px" viewBox="0 0 48 48">'+
    '<circle cx="24" cy="24" r="22" fill="#000"/>'+
    '<circle cx="24" cy="24" r="22" fill="none" stroke="'+c.accent+'" stroke-width="1.5"/>'+
    '<circle cx="24" cy="24" r="16" fill="none" stroke="#fff" stroke-width="1" opacity=".5"/>'+
    '<g stroke="'+c.accent+'" stroke-width="2.2">'+
      '<line x1="24" y1="10" x2="24" y2="38"/><line x1="10" y1="24" x2="38" y2="24"/>'+
      '<line x1="14" y1="14" x2="34" y2="34"/><line x1="34" y1="14" x2="14" y2="34"/></g>'+
    '<circle cx="24" cy="24" r="7" fill="#000" stroke="'+c.accent+'" stroke-width="1.5"/>'+
    '<text x="24" y="27" text-anchor="middle" font-family="monospace" font-size="7" font-weight="800" fill="'+c.accent+'">'+c.short+'</text>'+
  '</svg>';
}
function miniBadge(c){
  return '<span class="mini" style="background:linear-gradient(135deg,'+c.accent+',#000)"></span>';
}

/* ════════ RENDER ════════ */
function render(){
  const c = CLUBS[cur];
  // recolora il tema con i colori del club selezionato
  document.documentElement.style.setProperty('--inter-blue', c.accent);
  document.documentElement.style.setProperty('--inter-cyan', c.accent2);

  // sidebar club nav
  document.getElementById('clubNav').innerHTML = Object.keys(CLUBS).map(function(k){
    const cl = CLUBS[k];
    return '<div class="nav-item'+(k===cur?' active':'')+'" data-club="'+k+'">'+
      '<svg class="mini-crest" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="#000" stroke="'+cl.accent+'" stroke-width="2"/>'+
      '<text x="24" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="800" fill="'+cl.accent+'">'+cl.short+'</text></svg>'+
      cl.name+'</div>';
  }).join('');

  // chip
  document.getElementById('clubChip').innerHTML =
    '<svg class="badge" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#000" stroke="'+c.accent+'" stroke-width="1.5"/>'+
    '<text x="20" y="25" text-anchor="middle" font-family="monospace" font-size="11" font-weight="800" fill="'+c.accent+'">'+c.short+'</text></svg>'+
    '<div><div style="font-size:12px;font-weight:600">'+c.full.split(' ').slice(0,2).join(' ')+'</div>'+
    '<div style="font-family:var(--mono);font-size:9px;color:var(--txt3)">'+c.league+' · '+c.fin.season+'</div></div>';

  // topbar
  document.getElementById('topbar').innerHTML =
    crestSVG(c,46)+
    '<div><div class="club-h1">'+c.full+'</div>'+
    '<div class="club-meta">'+
      '<span>'+c.league.toUpperCase()+'</span>'+
      '<span>PROPRIETÀ <b>'+c.owner+'</b></span>'+
      '<span>STADIO '+c.stadium+' · '+intnum(c.capacity)+'</span>'+
      '<span>FONDATA '+c.founded+'</span>'+
    '</div></div>'+
    '<div class="topbar-right">'+
      '<div class="season-pick">Esercizio <b>'+c.fin.season+'</b></div>'+
      '<div class="season-pick"><span class="live-dot"></span> '+(LIVE?'Dati live · Supabase':'Dati verificati')+'</div>'+
    '</div>';

  // tabs
  document.getElementById('tabs').innerHTML = VIEWS.map(function(v){
    return '<div class="tab'+(v[0]===view?' active':'')+'" data-view="'+v[0]+'">'+v[1]+'</div>';
  }).join('');

  // stage
  const r = {panoramica:viewPanoramica, conto:viewConto, sostenibilita:viewSosten, peer:viewPeer, deal:viewDeal}[view];
  const stage = document.getElementById('stage');
  stage.style.animation='none'; void stage.offsetWidth; stage.style.animation='';
  stage.innerHTML = r(c);

  bind();
}

function bind(){
  document.querySelectorAll('[data-club]').forEach(function(el){
    el.onclick = function(){ cur = el.dataset.club; render(); window.scrollTo({top:0,behavior:'smooth'}); };
  });
  document.querySelectorAll('[data-view]').forEach(function(el){
    el.onclick = function(){ view = el.dataset.view; render(); window.scrollTo({top:0,behavior:'smooth'}); };
  });
}

}

function viewConto(c){
  const f=c.fin;
  const finGap = (f.net_result!=null && f.ebit!=null) ? (f.net_result - f.ebit) : null;
  let rows=''+
    row('Valore della produzione', eur(f.revenue_total), true)+
    sub('Diritti TV / UEFA', eur(f.broadcast))+
    sub('Ricavi commerciali / sponsor', eur(f.commercial))+
    sub('Ricavi stadio / gare', eur(f.matchday))+
    sub('Gestione calciatori (plusvalenze)', eur(f.player_trading))+
    sub('Altri ricavi', eur(f.revenue_other))+
    row('Costo del personale', '−'+eur(f.wages))+
    row('EBITDA', f.ebitda==null?'<span class="nd">n/d</span>':eur(f.ebitda), false, f.ebitda!=null)+
    row('Ammortamenti e svalutazioni', f.amortization==null?'<span class="nd">n/d</span>':'−'+eur(f.amortization))+
    row('EBIT (risultato operativo)', f.ebit==null?'<span class="nd">n/d</span>':eurSigned(f.ebit), false, f.ebit!=null)+
    row('Gestione finanziaria, straordinaria e fiscale', finGap==null?'<span class="nd">n/d</span>':eurSigned(finGap))+
    row('Risultato netto', eurSigned(f.net_result), true);

  // cascade — solo step disponibili
  const steps=[['Valore produzione', f.revenue_total],['EBITDA', f.ebitda],['EBIT', f.ebit],['Risultato netto', f.net_result]]
    .filter(function(s){return s[1]!=null;});
  const base=f.revenue_total;
  const casc = steps.map(function(s){
    const v=s[1]; const w=Math.max(2,Math.min(100, Math.abs(v)/base*100));
    const col = v<0?'var(--red)':'linear-gradient(90deg,var(--inter-navy),var(--inter-blue))';
    return '<div class="casc-row"><div class="ct"><span class="cn">'+s[0]+'</span>'+
      '<span class="cv" style="color:'+(v<0?'var(--red)':'var(--txt)')+'">'+eurSigned(v)+' · '+num(v/base*100)+'%</span></div>'+
      '<div class="ctrack"><div class="cfill" style="width:'+w+'%;background:'+col+'"></div></div></div>';
  }).join('');

  return ''+
  '<div class="sec-label">Conto economico riclassificato · '+f.season+'</div>'+
  '<div class="row" style="grid-template-columns:1.35fr 1fr">'+
    '<div class="card"><table class="pnl">'+rows+'</table></div>'+
    '<div class="card">'+
      '<div class="card-h"><h3>Cascata dei margini</h3><span class="hint">% sui ricavi</span></div>'+
      '<div class="card-sub">Quanto resta scendendo dal fatturato al risultato.</div>'+
      '<div class="casc">'+casc+'</div>'+
      (c.slug==='inter'?'<div style="margin-top:18px;font-size:11px;color:var(--txt3);line-height:1.5">EBITDA ed EBIT non sono esposti distintamente nel bilancio Inter caricato: mostrati come <span class="nd">n/d</span>.</div>':'')+
    '</div>'+
  '</div>'+
  srcLine(f);
}

function viewSosten(c){
  const f=c.fin;
  const wr=f.wage_ratio;
  const wrStatus = wr<=60?'ok':(wr<=70?'warn':'bad');
  const ndr = f.net_debt/f.revenue_total*100; // net debt su ricavi
  const ndrStatus = ndr<=100?'ok':(ndr<=150?'warn':'bad');
  return ''+
  '<div class="sec-label">Sostenibilità finanziaria · '+f.season+'</div>'+
  '<div class="row" style="grid-template-columns:1fr 1fr">'+
    '<div class="card">'+
      '<div class="card-h"><h3>Indicatori di sostenibilità</h3><span class="hint">soglie indicative</span></div>'+
      '<div class="card-sub">Costo del lavoro e leva finanziaria rispetto ai riferimenti UEFA/PSR.</div>'+
      '<div class="gauges">'+
        gauge('Costo personale / Ricavi', wr, 70, '%', wrStatus, 'Monte ingaggi su ricavi.<br>Riferimento sostenibilità ~70%')+
        gauge('PFN / Ricavi', ndr, 150, '%', ndrStatus, 'Indebitamento netto<br>rapportato ai ricavi annui')+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-h"><h3>Lettura</h3><span class="hint">'+c.name+'</span></div>'+
      '<div class="card-sub">Cosa dicono i numeri.</div>'+
      '<div class="statline" style="grid-template-columns:1fr 1fr;margin-top:6px">'+
        stat('Monte ingaggi', '€'+num(f.wages)+'M', 'costo del personale')+
        stat('Patrimonio netto', (f.equity<0?'−':'+')+'€'+num(Math.abs(f.equity))+'M', f.equity<0?'negativo, da monitorare':'positivo')+
        stat('PFN', '−€'+num(f.net_debt)+'M', 'debito finanziario netto')+
        stat('Risultato netto', (f.net_result>0?'+':'−')+'€'+num(Math.abs(f.net_result))+'M', f.net_result>0?'autofinanziamento':'assorbe equity')+
      '</div>'+
      '<div style="margin-top:18px;font-size:11.5px;color:var(--txt2);line-height:1.6;border-top:1px solid var(--line);padding-top:14px">'+
        (c.slug==='inter'
          ? 'Wage/revenue al <b style="color:var(--green)">44,7%</b>, ben sotto soglia: il monte ingaggi è sostenibile. L’equity è ancora negativo ma il primo utile in 15 anni inverte la rotta.'
          : 'Wage/revenue al <b style="color:var(--green)">46,1%</b> resta contenuto, ma la perdita d’esercizio è coperta dalle plusvalenze (€89,7M): margine operativo strutturalmente sotto pressione.')+
      '</div>'+
    '</div>'+
  '</div>'+
  '<div class="footnote warn"><b>◆ Nota metodologica.</b> Lo Squad Cost Ratio UEFA completo (costo rosa + ammortamenti cartellini + commissioni agenti ÷ ricavi, limite 70% dal 2025/26) richiede voci non sempre esposte nei bilanci caricati. Qui mostriamo il rapporto <b>costo del personale / ricavi</b>, voce verificata e comparabile. Lo SCR pieno arriverà quando il parser estrarrà ammortamenti cartellini e commissioni per ogni club.</div>'+
  srcLine(f);
}

      '<div class="club">'+miniBadge(c)+c.name+'</div>'+

  const body=ks.map(function(k){

      '<td>€'+num(f.player_trading)+'M</td>'+
      '<td style="color:'+(f.equity<0?'var(--red)':'var(--txt2)')+'">'+(f.equity<0?'−':'+')+'€'+num(Math.abs(f.equity))+'M</td>'+
    '</tr>';
  }).join('');

  return ''+
  '<div class="sec-label">Confronto peer · Serie A · 2024/25</div>'+
  '<div class="row" style="grid-template-columns:1fr 1.25fr">'+
    '<div class="card">'+
      '<div class="card-h"><h3>Ricavi a confronto</h3><span class="hint">€M</span></div>'+

      '<div class="card-sub">Il quadro completo, club per club.</div>'+
      '<table class="ptable">'+head+body+'</table>'+

}

        cell('Controllo','Exor N.V. (Agnelli)')+
      '</div>'+
      '<div style="margin-top:14px;font-size:11.5px;color:var(--txt2);line-height:1.6">Patrimonio netto positivo ma sottile (+€13,2M): la Juventus resta dipendente da aumenti di capitale e plusvalenze per restare entro le soglie di sostenibilità.</div>'+
      '</div>';
  }

  return ''+
  '<div class="sec-label">Operazioni dell’esercizio · '+f.season+'</div>'+
  '<div class="deals">'+cards+'</div>'+
  terms+
  srcLine(f);
}

/* ── component helpers ── */
function kpi(lab,val,sub,accent,tip,status){
  const pill = status==null?'' : (status==='ok'
    ? '<div class="delta up" style="margin-top:9px">● sotto soglia</div>'
    : '<div class="delta down" style="margin-top:9px">● sopra soglia</div>');
  return '<div class="kpi" style="--accent:'+accent+'">'+
    '<div class="src">i<span class="tip">'+tip+'</span></div>'+
    '<div class="lab">'+lab+'</div>'+
    '<div class="val">'+val+'</div>'+
    '<div class="sub">'+sub+'</div>'+pill+'</div>';
}
function splitRow(k,v,tot){
  const w=(v/tot*100); return '<div class="split-row"><div class="k">'+k+'</div>'+
    '<div class="bar"><div class="fill" style="width:'+w.toFixed(0)+'%"></div></div>'+
    '<div class="v">€'+num(v)+'M</div></div>';
}
function stat(l,v,d){ return '<div class="stat"><div class="sl">'+l+'</div><div class="sv">'+v+'</div><div class="sd">'+d+'</div></div>'; }
function jump(v,t,d){ return '<div class="jump" data-view="'+v+'"><div class="jt">'+t+'<span class="arr">→</span></div><div class="jd">'+d+'</div></div>'; }
function row(l,v,total,strong){
  const cls = total?' class="total"':''; const amtcls = strong?' style="color:#fff;font-weight:700"':'';
  return '<tr'+cls+'><td class="lbl">'+l+'</td><td class="amt"'+amtcls+'>'+v+'</td></tr>';
}
function sub(l,v){ return '<tr class="sub"><td class="lbl">'+l+'</td><td class="amt">'+v+'</td></tr>'; }
function cell(k,v){ return '<div class="cell"><div class="tk">'+k+'</div><div class="tv">'+v+'</div></div>'; }
function gauge(label,value,limit,unit,status,desc){
  const C=339; const frac=Math.max(0,Math.min(1, value/limit));
  const off=C*(1-frac);
  const col = status==='ok'?'var(--green)':(status==='warn'?'var(--gold)':'var(--red)');
  const pillTxt = status==='ok'?'Sostenibile':(status==='warn'?'Da monitorare':'Critico');
  const pillCls = status==='ok'?'ok':(status==='warn'?'warn':'bad');
  return '<div class="gauge"><div class="ring">'+
    '<svg width="128" height="128" viewBox="0 0 128 128">'+
      '<circle cx="64" cy="64" r="54" fill="none" stroke="var(--line)" stroke-width="11"/>'+
      '<circle cx="64" cy="64" r="54" fill="none" stroke="'+col+'" stroke-width="11" stroke-linecap="round" '+
        'stroke-dasharray="'+C+'" stroke-dashoffset="'+off.toFixed(0)+'" transform="rotate(-90 64 64)"/>'+
    '</svg>'+
    '<div class="ringval"><div class="big" style="color:'+col+'">'+num(value)+unit+'</div><div class="lim">limite '+limit+unit+'</div></div>'+
    '</div><div class="gl">'+label+'</div><div class="gd">'+desc+'</div>'+
    '<span class="status-pill '+pillCls+'">● '+pillTxt+'</span></div>';
}

/* ════════════════════════════════════════════════════════════
   FETCH LIVE — legge i dati reali da Supabase (tabelle pubbliche
   clubs / club_financials / club_deals via policy public read).
   Lo snapshot embedded sopra garantisce il primo render istantaneo;
   se il fetch riesce, i dati live lo sostituiscono.
   ════════════════════════════════════════════════════════════ */
const SB_URL = 'https://xxnmkiwnjpppfzrftvuv.supabase.co';
const SB_KEY = 'sb_publishable_ghHpuiBhQZNVOy7OgAg6-w_MaqRJXeT';

async function sb(path){
  const r = await fetch(SB_URL+'/rest/v1/'+path, {headers:{apikey:SB_KEY, Authorization:'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error('Supabase '+r.status);
  return r.json();
}
function toN(v){ return v==null||v==='' ? null : Number(v); }
function isDark(hex){
  if(!hex) return false; const c=hex.replace('#','');
  if(c.length<6) return false;
  const r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
  return (0.299*r+0.587*g+0.114*b) < 70;
}
function dealLabel(t){
  return {financing:'◆ Finanziamento · Bond', commercial:'◆ Commerciale · Sponsor',
    ownership:'◆ Proprietà', transfer:'◆ Mercato · Plusvalenze'}[t] || '◆ Operazione';
}
function fmtDate(s){
  if(!s) return ''; const m=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const d=new Date(s); if(isNaN(d.getTime())) return s;
  return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
}
function buildClub(cl, fin, deals){
  const dark = isDark(cl.color_primary);
  const accent  = dark ? (cl.color_secondary||'#E2B53C') : (cl.color_primary||'#0099E5');
  const accent2 = dark ? '#F4F4F4' : (cl.color_secondary||'#19E0C8');
  const f = fin || {};
  return {
    slug:cl.slug, name:cl.name, full:cl.full_name||cl.name,
    short:(cl.name||'??').replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase(),
    league:cl.league||'', owner:cl.owner||'n/d', stadium:cl.stadium||'',
    capacity:cl.capacity||0, founded:cl.founded||'', accent:accent, accent2:accent2,
    fin:{
      season:(f.season||'').replace('-','/'),
      revenue_total:toN(f.revenue_total), broadcast:toN(f.revenue_broadcast),
      commercial:toN(f.revenue_commercial), matchday:toN(f.revenue_matchday),
      revenue_other:toN(f.revenue_other), player_trading:toN(f.player_trading_income),
      wages:toN(f.wages), amortization:toN(f.amortization), ebitda:toN(f.ebitda),
      ebit:toN(f.ebit), net_result:toN(f.net_result), net_debt:toN(f.net_debt),
      equity:toN(f.equity), wage_ratio:toN(f.squad_cost_ratio),
      source:f.source||'', source_date:fmtDate(f.source_date), notes:f.notes||''
    },
    deals:(deals||[]).map(function(d){
      return {type:d.deal_type, label:dealLabel(d.deal_type), title:d.title, desc:d.description, value:d.value_text};
    })
  };
}
async function loadLive(){
  try{
    const [clubs, fins, deals] = await Promise.all([
      sb('clubs?select=*&order=sort_order.asc'),
      sb('club_financials?select=*&order=season.desc'),
      sb('club_deals?select=*&order=sort_order.asc')
    ]);
    if(!Array.isArray(clubs) || !clubs.length) return;
    const out = {};
    clubs.forEach(function(cl){
      const fin = (fins||[]).find(function(x){ return x.club_id===cl.id; }); // season.desc → la più recente
      const dl  = (deals||[]).filter(function(x){ return x.club_id===cl.id; });
      out[cl.slug] = buildClub(cl, fin, dl);
    });
    CLUBS = out;
    LIVE = true;
    if(!CLUBS[cur]) cur = Object.keys(CLUBS)[0];
    render();
  }catch(e){
    console.warn('Club Intelligence: fetch live non riuscito, uso snapshot verificato.', e);
  }
}

render();    // 1° render istantaneo dallo snapshot verificato
loadLive();  // poi sovrascrive con i dati live da Supabase
</script>
