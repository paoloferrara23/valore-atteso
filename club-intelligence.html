<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Club Intelligence — Valore Atteso</title>
<style>
  :root{
    --bg:#06070C; --bg2:#0A0C14; --panel:#0E1018; --panel2:#12141E;
    --line:#1E2230; --line2:#2A3040;
    --txt:#EAEDF5; --txt2:#9AA2B6; --txt3:#5A6175;
    --green:#28E0A0; --red:#FF5C6C; --gold:#E8C87A;
    /* dinamici per club (mantenuti per le viste legacy) */
    --inter-blue:#0099E5; --inter-cyan:#19E0C8; --inter-navy:#0A1A4A;
    --acc:#0099E5; --acc2:#19E0C8;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1300px 700px at 82% -12%, color-mix(in srgb, var(--inter-blue) 14%, transparent), transparent 60%),
      radial-gradient(1000px 600px at -8% 112%, rgba(40,224,160,.05), transparent 55%),
      repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.012) 2px 3px),
      var(--bg);
    color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  ::selection{background:var(--inter-blue);color:#000}
  a{color:inherit;text-decoration:none}
  .nd{color:var(--txt3);font-style:italic;font-weight:500}
  .cnt{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

  /* ─── Sidebar ─── */
  .side{
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-right:1px solid var(--line);
    padding:20px 14px; position:sticky; top:0; height:100vh;
    display:flex; flex-direction:column; gap:5px;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px}
  .brand-mark{
    width:36px;height:36px;border-radius:10px;flex:none;
    background:linear-gradient(135deg,var(--inter-blue),var(--inter-cyan));
    display:grid;place-items:center;font-weight:800;font-size:15px;color:#04121f;
    box-shadow:0 0 0 1px rgba(255,255,255,.07),0 10px 24px color-mix(in srgb,var(--inter-blue) 35%,transparent);
  }
  .brand-name{font-weight:750;font-size:14.5px;letter-spacing:-.3px}
  .brand-sub{font-family:var(--mono);font-size:8.5px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
  .nav-cap{font-family:var(--mono);font-size:8.5px;color:var(--txt3);letter-spacing:.18em;text-transform:uppercase;padding:14px 10px 7px}
  #nav{display:flex;flex-direction:column;gap:4px}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;
    color:var(--txt2);font-size:13.5px;font-weight:560;cursor:pointer;transition:.15s;position:relative;
  }
  .nav-item svg{width:22px;height:22px;flex:none}
  .nav-item .nav-ic{width:18px;height:18px}
  .nav-item:hover{background:var(--panel);color:var(--txt)}
  .nav-item.active{background:linear-gradient(90deg,color-mix(in srgb,var(--acc) 20%,transparent),transparent);color:#fff;box-shadow:inset 2px 0 0 var(--acc)}
  .nav-item.vs.active{--acc:var(--inter-cyan)}
  .nav-item.soon{opacity:.36;cursor:not-allowed}
  .nav-item.soon::after{content:'PRESTO';font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;margin-left:auto;color:var(--txt3);border:1px solid var(--line2);padding:1px 5px;border-radius:5px}
  .side-foot{margin-top:auto;border-top:1px solid var(--line);padding:13px 8px 2px}
  .foot-line{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--green);display:flex;align-items:center;gap:7px}
  .foot-sub{font-family:var(--mono);font-size:9px;color:var(--txt3);margin-top:5px;letter-spacing:.04em}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(40,224,160,.16);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}

  /* ─── Main ─── */
  .main{padding:0 0 70px;min-width:0}

  /* terminal header (confronto) */
  .thead{
    position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:18px;
    background:rgba(6,7,12,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);
    padding:13px 30px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  }
  .thead-l{display:flex;align-items:center;gap:9px;color:var(--txt2)}
  .thead-c{margin-left:auto;color:#fff;font-weight:600}
  .thead-r{margin-left:auto;color:var(--green)}

  /* club header */
  .chead{
    position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;
    background:rgba(6,7,12,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);
    padding:14px 30px;
  }
  .chead-crest{flex:none;filter:drop-shadow(0 6px 18px color-mix(in srgb,var(--ca) 40%,transparent))}
  .chead-name{font-size:19px;font-weight:760;letter-spacing:-.4px;line-height:1.05}
  .chead-meta{font-family:var(--mono);font-size:9.5px;color:var(--txt2);letter-spacing:.05em;margin-top:5px;display:flex;gap:13px;flex-wrap:wrap;text-transform:uppercase}
  .chead-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .chead-season{font-family:var(--mono);font-size:12px;color:var(--acc);font-weight:700}
  .vs-btn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--txt);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:8px 13px;cursor:pointer;transition:.15s}
  .vs-btn:hover{border-color:var(--acc);color:#fff}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);padding:0 30px;overflow-x:auto}
  .tab{padding:13px 16px;font-size:13px;font-weight:620;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px;white-space:nowrap}
  .tab:hover{color:var(--txt2)}
  .tab.active{color:#fff;border-bottom-color:var(--acc)}

  .wrap{padding:26px 30px;max-width:1240px}
  #stage{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ─── Section labels ─── */
  .sec-term,.sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--txt3);text-transform:uppercase;margin:30px 2px 14px;display:flex;align-items:center;gap:10px}
  .sec-term::after,.sec-label::after{content:'';flex:1;height:1px;background:var(--line)}

  /* ─── HOME · hero esplicativo ─── */
  .hero{position:relative;overflow:hidden;border:1px solid var(--line2);border-radius:22px;padding:38px 36px 30px;margin-bottom:16px;
    background:linear-gradient(125deg,rgba(0,153,229,.13),rgba(25,224,200,.05) 42%,var(--panel2))}
  .hero::before{content:'';position:absolute;right:-90px;top:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,153,229,.20),transparent 70%);pointer-events:none}
  .hero::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 40px,rgba(255,255,255,.014) 40px 41px);pointer-events:none}
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;position:relative}
  .hero-eye{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--inter-cyan)}
  .hero-clubs{display:flex;gap:8px}
  .hero-club-chip{cursor:pointer;transition:.18s;filter:drop-shadow(0 5px 14px rgba(0,0,0,.45))}
  .hero-club-chip:hover{transform:translateY(-3px) scale(1.07)}
  .hero-h1{font-size:clamp(27px,4.1vw,44px);font-weight:850;letter-spacing:-1.5px;line-height:1.05;max-width:780px;position:relative;margin-top:16px}
  .hero-h1 .hl{background:linear-gradient(90deg,var(--inter-blue),var(--inter-cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero-p{color:var(--txt2);font-size:14.5px;line-height:1.6;max-width:580px;margin:15px 0 20px;position:relative}
  .hero-trust{display:flex;gap:9px;flex-wrap:wrap;position:relative;margin-bottom:22px}
  .trust{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--txt2);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:999px;padding:7px 13px}
  .trust b{color:var(--inter-cyan);font-weight:600}
  .hero-cta{display:flex;gap:14px;align-items:center;position:relative;flex-wrap:wrap}
  .btn-primary{font-family:var(--sans);font-size:13.5px;font-weight:700;color:#04121f;background:linear-gradient(90deg,var(--inter-blue),var(--inter-cyan));border:none;border-radius:11px;padding:12px 20px;cursor:pointer;transition:.16s;box-shadow:0 10px 26px rgba(0,153,229,.3)}
  .btn-primary:hover{transform:translateY(-2px)}
  .hero-hint{font-family:var(--mono);font-size:10px;color:var(--txt3)}
  .insight{position:relative;margin-top:24px;border-top:1px solid var(--line);padding-top:15px;min-height:54px}
  .insight-lab{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)}
  .insight-item{display:flex;align-items:center;gap:12px;margin-top:9px;cursor:pointer;animation:fade .5s ease}
  .insight-item .ic{font-size:14px}
  .insight-item b{color:#fff;font-weight:650;font-size:14px}
  .insight-item .ival{font-family:var(--mono);font-weight:800;margin-left:auto;font-size:16px;font-variant-numeric:tabular-nums}
  .insight-item:hover b{color:var(--inter-cyan)}

  /* steps */
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
  .stepc{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:17px 18px}
  .stepc .sn{font-family:var(--mono);font-size:10px;color:var(--inter-blue);letter-spacing:.1em}
  .stepc .st{font-weight:720;font-size:13.5px;margin:9px 0 6px}
  .stepc .sd{font-size:11.5px;color:var(--txt3);line-height:1.5}

  /* ─── PEERS · classifica interattiva ─── */
  .peers-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;color:var(--txt2);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 13px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--line2);color:var(--txt)}
  .chip.active{color:#04121f;background:linear-gradient(90deg,var(--inter-blue),var(--inter-cyan));border-color:transparent;font-weight:700}
  .ptable{display:flex;flex-direction:column;gap:9px}
  .prow{display:grid;grid-template-columns:46px 156px 1fr 132px;align-items:center;gap:15px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:13px;padding:14px 18px;cursor:pointer;transition:border-color .15s,background .15s;will-change:transform}
  .prow:hover{border-color:var(--rc);background:color-mix(in srgb,var(--rc) 6%,var(--panel))}
  .prow.first{border-color:color-mix(in srgb,var(--rc) 55%,var(--line));box-shadow:0 0 0 1px color-mix(in srgb,var(--rc) 30%,transparent),0 10px 30px rgba(0,0,0,.3)}
  .prank{font-family:var(--mono);font-weight:800;font-size:17px;color:var(--txt3);text-align:center}
  .prow.first .prank{color:var(--rc)}
  .pclub{display:flex;align-items:center;gap:11px;font-weight:750;font-size:15px;letter-spacing:-.2px}
  .ptrack{height:13px;background:var(--bg);border-radius:7px;overflow:hidden}
  .pfill{height:100%;border-radius:7px;animation:growW .9s cubic-bezier(.2,.8,.2,1)}
  .pval{font-family:var(--mono);font-size:15.5px;font-weight:750;text-align:right;font-variant-numeric:tabular-nums}
  .pmeta{font-family:var(--mono);font-size:9.5px;color:var(--txt3);letter-spacing:.04em}
  .board-note{margin-top:26px;padding:14px 18px;background:rgba(40,224,160,.05);border:1px solid rgba(40,224,160,.18);border-radius:11px;font-size:11.5px;color:var(--txt2);line-height:1.6}

  /* ─── club hero ─── */
  .hero-club{display:flex;align-items:center;gap:26px;background:linear-gradient(115deg,color-mix(in srgb,var(--ca) 14%,var(--panel)),var(--panel2));border:1px solid var(--line2);border-radius:20px;padding:26px 30px;position:relative;overflow:hidden}
  .hero-club::before{content:'';position:absolute;right:-70px;top:-70px;width:320px;height:320px;background:radial-gradient(circle,color-mix(in srgb,var(--ca) 26%,transparent),transparent 70%);pointer-events:none}
  .hero-crest{flex:none;filter:drop-shadow(0 10px 28px color-mix(in srgb,var(--ca) 45%,transparent))}
  .hero-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--ca);text-transform:uppercase}
  .hero-name{font-size:25px;font-weight:800;letter-spacing:-.7px;margin:7px 0 18px}
  .hero-numbers{display:grid;grid-template-columns:repeat(4,auto);gap:30px}
  .hn-l{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--txt3);text-transform:uppercase}
  .hn-v{font-size:clamp(20px,2vw,27px);font-weight:820;letter-spacing:-1px;margin-top:5px;font-variant-numeric:tabular-nums}
  .hn-v.acc{color:var(--ca)} .hn-v.pos{color:var(--green)} .hn-v.neg{color:var(--red)}

  /* ─── cards / generic ─── */
  .row{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:16px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:20px 22px}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .card-h h3{font-size:14.5px;font-weight:720;letter-spacing:-.2px}
  .card-h .hint{font-family:var(--mono);font-size:9.5px;color:var(--txt3);letter-spacing:.06em}
  .card-sub{font-size:11.5px;color:var(--txt3);margin-bottom:18px}

  /* split bars */
  .split{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .split-row{display:flex;align-items:center;gap:11px}
  .split-row .k{font-size:12px;color:var(--txt2);width:150px;flex:none}
  .split-row .bar{flex:1;height:9px;background:var(--bg);border-radius:6px;overflow:hidden}
  .split-row .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,color-mix(in srgb,var(--acc) 40%,#000),var(--acc));animation:growW 1s cubic-bezier(.2,.8,.2,1)}
  .split-row .v{font-family:var(--mono);font-size:11.5px;color:var(--txt);width:64px;text-align:right;flex:none}

  /* statline */
  .statline{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  .stat{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:14px}
  .stat .sl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
  .stat .sv{font-size:19px;font-weight:760;letter-spacing:-.5px;margin-top:7px;font-variant-numeric:tabular-nums}
  .stat .sd{font-size:10.5px;color:var(--txt3);margin-top:4px;line-height:1.4}

  /* P&L */
  .pnl{width:100%;border-collapse:collapse;margin-top:4px}
  .pnl td{padding:11px 6px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  .pnl td.lbl{color:var(--txt2)}
  .pnl td.amt{text-align:right;font-family:var(--mono);font-size:13px;color:var(--txt);font-variant-numeric:tabular-nums;white-space:nowrap}
  .pnl tr.sub td{font-size:11.5px;color:var(--txt3);padding:6px 6px 6px 24px;border-bottom:none}
  .pnl tr.sub td.amt{color:var(--txt2)}
  .pnl tr.total td{font-weight:760;color:#fff;font-size:14px;border-top:1px solid var(--line2);border-bottom:none;padding-top:13px}

  /* cascade */
  .casc{display:flex;flex-direction:column;gap:13px;margin-top:6px}
  .casc-row .ct{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .casc-row .ct .cn{color:var(--txt2);font-weight:600}
  .casc-row .ct .cv{font-family:var(--mono);font-size:12.5px}
  .casc-row .ctrack{height:9px;background:var(--bg);border-radius:6px;overflow:hidden}
  .casc-row .cfill{height:100%;border-radius:6px;animation:growW 1s cubic-bezier(.2,.8,.2,1)}

  /* gauges */
  .gauges{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .gauge{text-align:center}
  .gauge .ring{position:relative;width:128px;height:128px;margin:0 auto 8px}
  .gauge .ringval{position:absolute;inset:0;display:grid;place-content:center}
  .gauge .ringval .big{font-size:25px;font-weight:780;letter-spacing:-1px}
  .gauge .ringval .lim{font-family:var(--mono);font-size:9px;color:var(--txt3)}
  .gauge .gl{font-size:12.5px;font-weight:600;margin-top:2px}
  .gauge .gd{font-size:10.5px;color:var(--txt3);margin-top:3px;line-height:1.4}
  .ring-fg{animation:ringgrow 1.15s ease both}
  @keyframes ringgrow{from{stroke-dashoffset:339}}
  .status-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:3px 8px;border-radius:6px;margin-top:8px;text-transform:uppercase}
  .status-pill.ok{color:var(--green);background:rgba(40,224,160,.12)}
  .status-pill.warn{color:var(--gold);background:rgba(232,200,122,.12)}
  .status-pill.bad{color:var(--red);background:rgba(255,92,108,.12)}

  /* deals */
  .deals{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
  .deal{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:16px 17px;transition:.16s}
  .deal:hover{border-color:var(--line2)}
  .deal .dt{font-family:var(--mono);font-size:9px;color:var(--inter-cyan);letter-spacing:.1em;text-transform:uppercase}
  .deal .dh{font-size:14px;font-weight:680;margin:8px 0 6px;letter-spacing:-.2px;line-height:1.3}
  .deal .dd{font-size:11.5px;color:var(--txt3);line-height:1.55}
  .deal .dv{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:11px;color:var(--gold)}

  /* term sheet */
  .terms{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:6px}
  .terms .cell{padding:13px 16px;border-bottom:1px solid var(--line)}
  .terms .cell:nth-child(odd){border-right:1px solid var(--line)}
  .terms .tk{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3)}
  .terms .tv{font-size:14px;font-weight:600;margin-top:5px}

  /* jump */
  .jumpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  .jump{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:17px 18px;cursor:pointer;transition:.18s}
  .jump:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.35)}
  .jump .jt{font-weight:680;font-size:14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .jump .jt .arr{color:var(--acc);font-size:16px}
  .jump .jd{font-size:11.5px;color:var(--txt3);line-height:1.5}

  .footnote{margin-top:30px;padding:14px 18px;background:rgba(40,224,160,.05);border:1px solid rgba(40,224,160,.18);border-radius:11px;font-size:11.5px;color:var(--txt2);line-height:1.6}
  .footnote b{color:var(--green)}
  .footnote.warn{background:rgba(232,200,122,.06);border-color:rgba(232,200,122,.2)}
  .footnote.warn b{color:var(--gold)}

  @keyframes growW{from{width:0}}

  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:sticky;top:0;height:auto;flex-direction:row;align-items:center;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:9px 12px;gap:8px;z-index:30}
    .side .brand,.nav-cap,.nav-item.soon,.side-foot{display:none}
    #nav{flex-direction:row;gap:8px}
    .nav-item{white-space:nowrap;padding:7px 11px;border-radius:999px;border:1px solid var(--line)}
    .nav-item.active{box-shadow:none;border-color:var(--acc)}
    .steps{grid-template-columns:1fr 1fr}
    .row{grid-template-columns:1fr!important}
    .deals,.gauges,.terms{grid-template-columns:1fr}
    .jumpgrid,.hero-numbers{grid-template-columns:1fr 1fr}
    .hero-club{flex-direction:column;align-items:flex-start;gap:18px}
    .hero-top{flex-direction:column}

/* ── helpers numerici ── */
function num(v,maxDec){ if(v==null) return null;
  return Number(v).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:(maxDec==null?1:maxDec)}); }
function fmt(v,dec){ return Number(v).toLocaleString('it-IT',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function eur(v){ return v==null ? '<span class="nd">n/d</span>' : '€'+num(v)+'M'; }
function eurSigned(v){ if(v==null) return '<span class="nd">n/d</span>';
  const sign = v>0?'+':(v<0?'−':''); const col = v>0?'var(--green)':(v<0?'var(--red)':'var(--txt)');
  return '<span style="color:'+col+'">'+sign+'€'+num(Math.abs(v))+'M</span>'; }
function pct(v){ return v==null ? '<span class="nd">n/d</span>' : num(v)+'%'; }
function pfn(v){ if(v==null) return '<span class="nd">n/d</span>';
  if(v>0) return '<span style="color:var(--red)">−€'+num(v)+'M</span>';
  if(v<0) return '<span style="color:var(--green)">+€'+num(Math.abs(v))+'M</span>';
  return '€0M'; }
function intnum(v){ return Number(v).toLocaleString('it-IT'); }
/* count-up span */
function dataNum(value,opts){
  opts=opts||{}; var dec=opts.dec!=null?opts.dec:1;
  if(value==null) return '<span class="nd">n/d</span>';
  var pre=opts.prefix||'', suf=opts.suffix||'';
  return '<span class="cnt" data-count="'+value+'" data-dec="'+dec+'" data-prefix="'+pre+'" data-suffix="'+suf+'">'+pre+fmt(value,dec)+suf+'</span>';
}
function animateCounts(root){
  root.querySelectorAll('.cnt[data-count]').forEach(function(el){
    var target=parseFloat(el.dataset.count); if(isNaN(target)) return;
    var dec=parseInt(el.dataset.dec||'0'), pre=el.dataset.prefix||'', suf=el.dataset.suffix||'';
    if(prefersReduced){ el.textContent=pre+fmt(target,dec)+suf; return; }
    var dur=950, t0=performance.now();
    function frame(t){ var p=Math.min(1,(t-t0)/dur); var e=1-Math.pow(1-p,3);
      el.textContent=pre+fmt(target*e,dec)+suf;
      if(p<1) requestAnimationFrame(frame); else el.textContent=pre+fmt(target,dec)+suf; }
    requestAnimationFrame(frame);
  });
}

function render(){
  if(insightTimer){ clearInterval(insightTimer); insightTimer=null; }
  const ks=Object.keys(CLUBS);
  if(!CLUBS[cur]) cur=ks[0];

  el('nav').innerHTML =

      'Classifica</div>'+

    ks.map(function(k){ const cl=CLUBS[k];
      return '<div class="nav-item'+(mode==='club'&&k===cur?' active':'')+'" data-club="'+k+'" style="--acc:'+cl.accent+'">'+crest(cl,22)+'<span>'+cl.name+'</span></div>';
    }).join('');

  el('foot').innerHTML='<div class="foot-line"><span class="live-dot"></span>'+(LIVE?'LIVE · SUPABASE':'SNAPSHOT VERIFICATO')+'</div>'+
    '<div class="foot-sub">'+ks.length+' club · Serie A · 2024/25</div>';

  if(mode==='home'){
    setTheme('#0099E5','#19E0C8');
    el('head').innerHTML = termHead();
    el('tabs').style.display='none';
    setStage(renderHome(ks));
    paintPeers(false);
    startInsight();
  } else {
    const c=CLUBS[cur];
    setTheme(c.accent,c.accent2);
    el('head').innerHTML = clubHead(c);
    el('tabs').style.display='flex';
    el('tabs').innerHTML = CLUB_TABS.map(function(t){ return '<div class="tab'+(t[0]===tab?' active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</div>'; }).join('');
    const r = {panoramica:viewPanoramica, conto:viewConto, sostenibilita:viewSosten, deal:viewDeal}[tab] || viewPanoramica;
    setStage(r(c));
  }
  bind();
}
function setStage(html){
  const s=el('stage'); s.style.animation='none'; void s.offsetWidth; s.style.animation='';

}
function bind(){
  document.querySelectorAll('[data-go]').forEach(function(x){ x.onclick=function(){ mode=x.dataset.go; render(); scrollTop(); }; });

function peerRows(mk){

  var ks = Object.keys(CLUBS).slice();
  ks.sort(function(a,b){
    var va=CLUBS[a].fin[m.key], vb=CLUBS[b].fin[m.key];
    va=(va==null)?-Infinity:va; vb=(vb==null)?-Infinity:vb;
    var sa=(m.better==='high')?va:-va, sb=(m.better==='high')?vb:-vb;
    return sb-sa;
  });
  var maxAbs=Math.max.apply(null, ks.map(function(k){ var v=CLUBS[k].fin[m.key]; return v==null?0:Math.abs(v); }))||1;
  return ks.map(function(k,i){
    var c=CLUBS[k], v=c.fin[m.key];
    var w=v==null?0:Math.abs(v)/maxAbs*100;
    var neg=(v!=null&&v<0);

    else if(m.key==='net_result'||m.key==='equity') fill=(neg?'var(--red)':'linear-gradient(90deg,'+c.accent+'66,'+c.accent+')');

      '<div class="ptrack"><div class="pfill" style="width:'+w.toFixed(1)+'%;background:'+fill+'"></div></div>'+
      '<div class="pval">'+dataNumMetric(m,v)+'</div>'+

  }).join('');
}

function dealLabel(t){
  return {financing:'◆ Finanziamento · Bond', commercial:'◆ Commerciale · Sponsor',
    ownership:'◆ Proprietà', transfer:'◆ Mercato · Plusvalenze'}[t] || '◆ Operazione';
}
function fmtDate(s){
  if(!s) return ''; const m=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const d=new Date(s); if(isNaN(d.getTime())) return s;
  return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
}
function buildClub(cl, fin, deals){
  const dark = isDark(cl.color_primary);
  const accent  = dark ? (cl.color_secondary||'#E2B53C') : (cl.color_primary||'#0099E5');
  const accent2 = dark ? '#F4F4F4' : (cl.color_secondary||'#19E0C8');
  const f = fin || {};
  return {
    slug:cl.slug, name:cl.name, full:cl.full_name||cl.name,
    short:(cl.name||'??').replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase(),
    league:cl.league||'', owner:cl.owner||'n/d', stadium:cl.stadium||'',
    capacity:cl.capacity||0, founded:cl.founded||'', accent:accent, accent2:accent2,
    fin:{
      season:(f.season||'').replace('-','/'),
      revenue_total:toN(f.revenue_total), broadcast:toN(f.revenue_broadcast),
      commercial:toN(f.revenue_commercial), matchday:toN(f.revenue_matchday),
      revenue_other:toN(f.revenue_other), player_trading:toN(f.player_trading_income),
      wages:toN(f.wages), amortization:toN(f.amortization), ebitda:toN(f.ebitda),
      ebit:toN(f.ebit), net_result:toN(f.net_result), net_debt:toN(f.net_debt),
      equity:toN(f.equity), wage_ratio:toN(f.squad_cost_ratio),
      source:f.source||'', source_date:fmtDate(f.source_date), notes:f.notes||''
    },
    deals:(deals||[]).map(function(d){
      return {type:d.deal_type, label:dealLabel(d.deal_type), title:d.title, desc:d.description, value:d.value_text};
    })
  };
}
async function loadLive(){
  try{
    const [clubs, fins, deals] = await Promise.all([
      sb('clubs?select=*&order=sort_order.asc'),
      sb('club_financials?select=*&order=season.desc'),
      sb('club_deals?select=*&order=sort_order.asc')
    ]);
    if(!Array.isArray(clubs) || !clubs.length) return;
    const out = {};
    clubs.forEach(function(cl){
      const fin = (fins||[]).find(function(x){ return x.club_id===cl.id; });
      const dl  = (deals||[]).filter(function(x){ return x.club_id===cl.id; });
      out[cl.slug] = buildClub(cl, fin, dl);
    });
    CLUBS = out;
    LIVE = true;
    if(!CLUBS[cur]) cur = Object.keys(CLUBS)[0];
    render();
  }catch(e){
    console.warn('Club Intelligence: fetch live non riuscito, uso snapshot verificato.', e);
  }
}

render();    // 1° render istantaneo dallo snapshot verificato
loadLive();  // poi sovrascrive con i dati live da Supabase
</script>
