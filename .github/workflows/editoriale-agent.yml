name: Editoriale Agent

on:
  schedule:
    - cron: '0 7 * * 1'  # Lunedì 08:00 IT (7 UTC)
  workflow_dispatch:

jobs:
  genera:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm init -y 2>/dev/null || true && npm install @supabase/supabase-js 2>/dev/null || true
      - name: Esegui Editoriale Agent
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
        run: node scripts/agent.js
