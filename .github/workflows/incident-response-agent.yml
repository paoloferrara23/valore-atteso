name: Incident Response Agent

on:
  schedule:
    - cron: '0 8 * * *'  # Ogni giorno alle 9:00 ora italiana
  workflow_dispatch:

jobs:
  incident-response:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm init -y 2>/dev/null || true && npm install @supabase/supabase-js 2>/dev/null || true
      - name: Controlla incidents e anomalie
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/incident-response-agent.js
