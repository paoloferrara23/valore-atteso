name: Cost Guardian

on:
  schedule:
    - cron: '0 8 * * 5'  # Ogni venerdì alle 9:00 ora italiana
  workflow_dispatch:

jobs:
  controlla-costi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm init -y 2>/dev/null || true && npm install @supabase/supabase-js 2>/dev/null || true
      - name: Controlla costi e invia report
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SOGLIA_ANTHROPIC: '10'
          SOGLIA_RESEND: '10'
        run: node scripts/cost-guardian.js
