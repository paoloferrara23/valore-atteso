name: Scout — Business del Calcio

on:
  schedule:
    - cron: '0 6 * * 6'  # Sabato 7:00 ora italiana
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cerca notizie e invia brief
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/scout.js
