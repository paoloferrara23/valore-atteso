name: Bilancio Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # ogni giorno 08:00 IT (6 UTC): controlla la cartella Drive

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Esegui Bilancio Ingest
        env:
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
        run: node scripts/bilancio-ingest.js
