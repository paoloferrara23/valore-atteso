name: Setup DNS

on:
  workflow_dispatch:
  push:
    branches:
      - claude/expected-value-connection-b6rYo

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Esegui Setup DNS
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node scripts/setup-dns.js
