<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valore Atteso — AD</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F4EE;--cream2:#EDE9E0;--ink:#111010;--ink2:#3D3C39;--ink3:#888480;
  --rule:#C8C4BB;--green:#1A3A2A;--gpal:#E8F0EB;--red:#B5221A;
  --dp:'Playfair Display',Georgia,serif;--sf:'Source Serif 4',Georgia,serif;--mn:'JetBrains Mono',monospace;
}
body{background:var(--ink);color:var(--cream);font-family:var(--sf);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--cream);color:var(--ink);padding:48px 40px;max-width:380px;width:100%;text-align:center}
.login-logo{font-family:var(--dp);font-size:1.8rem;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
.login-sub{font-family:var(--mn);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:32px}
.login-label{font-family:var(--mn);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);text-align:left;margin-bottom:6px;display:block}
.login-input{width:100%;height:46px;border:1.5px solid var(--rule);background:#fff;padding:0 14px;font-family:var(--mn);font-size:14px;color:var(--ink);outline:none;margin-bottom:10px;letter-spacing:.06em;border-radius:3px}
.login-input:focus{border-color:var(--ink)}
.login-btn{width:100%;height:46px;background:var(--ink);color:var(--cream);border:none;font-family:var(--mn);font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:background .15s}
.login-btn:hover{background:var(--ink2)}
.login-err{font-family:var(--mn);font-size:10px;color:var(--red);margin-top:10px;letter-spacing:.04em;display:none}

/* APP */
.app{flex:1;display:none;flex-direction:column;height:100vh}

/* HEADER */
.hd{border-bottom:1px solid rgba(255,255,255,.1);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-avatar{width:32px;height:32px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--dp);font-size:14px;font-weight:700;color:var(--ink)}
.hd-name{font-family:var(--sf);font-size:14px;font-weight:400;color:var(--cream)}
.hd-status{font-family:var(--mn);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.06em;display:flex;align-items:center;gap:5px}
.hd-dot{width:6px;height:6px;border-radius:50%;background:#7FCF97}
.hd-right{display:flex;gap:16px;align-items:center}
.hd-btn{font-family:var(--mn);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;transition:color .15s}
.hd-btn:hover{color:rgba(255,255,255,.7)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-track{background:transparent}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* MESSAGES */
.msg{display:flex;gap:10px;max-width:75%;animation:msgin .25s ease}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ad{align-self:flex-start}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mn);font-size:10px;font-weight:500;margin-top:2px}
.msg.ad .msg-avatar{background:var(--cream);color:var(--ink)}
.msg.user .msg-avatar{background:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
.msg-bubble{padding:12px 16px;border-radius:12px;font-family:var(--sf);font-size:14px;line-height:1.65;font-weight:300}
.msg.ad .msg-bubble{background:rgba(255,255,255,.08);color:var(--cream);border-radius:4px 12px 12px 12px}
.msg.user .msg-bubble{background:var(--cream);color:var(--ink);border-radius:12px 4px 12px 12px}
.msg-time{font-family:var(--mn);font-size:8px;color:rgba(255,255,255,.25);letter-spacing:.04em;margin-top:4px;text-align:right}
.msg.ad .msg-time{text-align:left}

/* TYPING */
.typing{display:none;align-self:flex-start;align-items:center;gap:10px}
.typing-avatar{width:28px;height:28px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--mn);font-size:10px;font-weight:500;color:var(--ink);flex-shrink:0}
.typing-bubble{background:rgba(255,255,255,.08);padding:12px 16px;border-radius:4px 12px 12px 12px;display:flex;gap:4px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);animation:tdot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* QUICK ACTIONS */
.quick{padding:12px 24px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.qa{padding:6px 14px;border:1px solid rgba(255,255,255,.15);background:transparent;font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);cursor:pointer;border-radius:100px;transition:all .15s;white-space:nowrap}
.qa:hover{border-color:rgba(255,255,255,.4);color:var(--cream);background:rgba(255,255,255,.05)}

/* INPUT */
.input-area{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.input-box{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:12px 16px;font-family:var(--sf);font-size:14px;color:var(--cream);outline:none;resize:none;min-height:46px;max-height:120px;transition:border-color .15s;line-height:1.5;font-weight:300}
.input-box:focus{border-color:rgba(255,255,255,.3)}
.input-box::placeholder{color:rgba(255,255,255,.25)}
.send-btn{width:40px;height:40px;background:var(--cream);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:opacity .15s;flex-shrink:0}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* CONTEXT PANEL */
.ctx{width:260px;border-left:1px solid rgba(255,255,255,.08);padding:20px;flex-shrink:0;overflow-y:auto;display:none}
@media(min-width:900px){.ctx{display:block}}
.ctx-title{font-family:var(--mn);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.ctx-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ctx-label{font-family:var(--mn);font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.06em;margin-bottom:3px;text-transform:uppercase}
.ctx-val{font-family:var(--sf);font-size:13px;color:rgba(255,255,255,.75);font-weight:300}
.ctx-val.green{color:#7FCF97}
.ctx-val.red{color:#F28472}

.app-inner{display:flex;flex:1;overflow:hidden}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <div class="login-logo">Valore Atteso</div>
    <div class="login-sub">AD — Accesso riservato</div>
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entra →</button>
    <div class="login-err" id="login-err">Password errata.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-avatar">AD</div>
      <div>
        <div class="hd-name">Amministratore Delegato</div>
        <div class="hd-status"><span class="hd-dot"></span>Online — Valore Atteso</div>
      </div>
    </div>
    <div class="hd-right">
      <button class="hd-btn" onclick="clearChat()">Nuova conversazione</button>
      <button class="hd-btn" onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="app-inner">
    <div class="chat-wrap">
      <div class="chat" id="chat">
        <div class="typing" id="typing">
          <div class="typing-avatar">AD</div>
          <div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>

      <div class="quick" id="quick-actions">
        <button class="qa" onclick="send('Come stiamo questa settimana?')">Come stiamo?</button>
        <button class="qa" onclick="send('Quanti iscritti abbiamo?')">Iscritti</button>
        <button class="qa" onclick="send('Qual è lo stato dei costi?')">Costi</button>
        <button class="qa" onclick="send('Cosa pubblichiamo la prossima settimana?')">Prossima edizione</button>
        <button class="qa" onclick="send('Dimmi le ultime edizioni pubblicate')">Archivio</button>
        <button class="qa" onclick="send('Come posso crescere gli iscritti?')">Crescita</button>
      </div>

      <div class="input-area">
        <textarea class="input-box" id="msg-input" placeholder="Scrivi all'AD…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>

    <div class="ctx" id="ctx-panel">
      <div class="ctx-title">Stato sistema</div>
      <div class="ctx-item"><div class="ctx-label">Iscritti</div><div class="ctx-val" id="ctx-subs">—</div></div>
      <div class="ctx-item"><div class="ctx-label">Edizioni pubblicate</div><div class="ctx-val" id="ctx-eds">—</div></div>
      <div class="ctx-item"><div class="ctx-label">Ultima edizione</div><div class="ctx-val" id="ctx-last">—</div></div>
      <div class="ctx-item"><div class="ctx-label">Sito</div><div class="ctx-val green" id="ctx-site">Online ✓</div></div>
      <div class="ctx-item"><div class="ctx-label">Agent lunedì</div><div class="ctx-val green">Attivo ✓</div></div>
      <div class="ctx-item"><div class="ctx-label">Cost Guardian</div><div class="ctx-val green">Attivo ✓</div></div>
    </div>
  </div>
</div>

<script>
const PWD = 'valopro2025';
const SURL = 'https://xxnmkiwnjpppfzrftvuv.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4bm1raXduanBwcGZ6cmZ0dnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTkwNTUsImV4cCI6MjA5MTk5NTA1NX0.2EePZNm_OCc9WscYSG7CL_mbFV6E8ifwV9sP2WxkUo4';
const ANTHROPIC_KEY = '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';

let history = [];
let systemContext = {};

// LOGIN
function doLogin(){
  if(document.getElementById('pwd').value === PWD){
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}
function doLogout(){
  location.reload();
}

// INIT
async function initApp(){
  await loadContext();
  addMsg('ad', `Buongiorno. Sono il tuo AD di Valore Atteso.\n\nHo accesso a tutto: iscritti, edizioni pubblicate, costi, stato degli agenti. Puoi chiedermi qualsiasi cosa sul progetto o darmi direttive.\n\nCosa vuoi sapere?`);
}

async function loadContext(){
  try{
    const [subsRes, edsRes] = await Promise.all([
      fetch(SURL+'/rest/v1/subscribers?select=email,confirmed&confirmed=eq.true', {headers:{apikey:SKEY,Authorization:'Bearer '+SKEY}}),
      fetch(SURL+'/rest/v1/editions?select=num,title,date&published=eq.true&order=num.desc', {headers:{apikey:SKEY,Authorization:'Bearer '+SKEY}})
    ]);
    const subs = await subsRes.json();
    const eds = await edsRes.json();

    systemContext = {
      iscritti: subs.length || 0,
      edizioni: eds.length || 0,
      ultimaEdizione: eds[0] ? `#${eds[0].num} — ${eds[0].title} (${eds[0].date})` : 'Nessuna',
      edizioniList: eds.slice(0,5).map(e=>`#${e.num}: ${e.title}`).join('\n')
    };

    document.getElementById('ctx-subs').textContent = systemContext.iscritti + ' confermati';
    document.getElementById('ctx-eds').textContent = systemContext.edizioni;
    document.getElementById('ctx-last').textContent = eds[0] ? `#${eds[0].num} — ${eds[0].date}` : '—';
  }catch(e){
    console.error('Errore caricamento context:', e);
  }
}

// CHAT
function addMsg(role, text){
  const chat = document.getElementById('chat');
  const typing = document.getElementById('typing');
  const time = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ad' ? 'AD' : 'PF'}</div>
    <div>
      <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${time}</div>
    </div>`;

  chat.insertBefore(div, typing);
  chat.scrollTop = chat.scrollHeight;

  history.push({role: role === 'ad' ? 'assistant' : 'user', content: text});
}

function showTyping(show){
  const t = document.getElementById('typing');
  t.style.display = show ? 'flex' : 'none';
  if(show) document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function clearChat(){
  history = [];
  const chat = document.getElementById('chat');
  const typing = document.getElementById('typing');
  while(chat.firstChild && chat.firstChild !== typing) chat.removeChild(chat.firstChild);
  addMsg('ad', 'Nuova conversazione iniziata. Come posso aiutarti?');
}

async function sendMsg(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  autoResize(input);
  await send(text);
}

async function send(text){
  document.getElementById('send-btn').disabled = true;
  addMsg('user', text);
  showTyping(true);

  const systemPrompt = `Sei l'Amministratore Delegato virtuale di Valore Atteso, una newsletter italiana sul business del calcio fondata da Paolo Ferrara, Manager M&A Advisory in Andersen Italia.

CONTESTO ATTUALE DEL PROGETTO:
- Iscritti confermati: ${systemContext.iscritti}
- Edizioni pubblicate: ${systemContext.edizioni}
- Ultima edizione: ${systemContext.ultimaEdizione}
- Ultime edizioni: ${systemContext.edizioniList || 'Nessuna ancora'}
- Sito: valore-atteso.vercel.app (live)
- Stack: Vercel + Supabase + Resend + GitHub Actions
- Agenti attivi: Editoriale Agent (lunedì 8:00), Cost Guardian (venerdì 9:00)
- Soglie costi: €10/mese Anthropic, €10/mese Resend

CARATTERE:
Parli come un AD esperto — diretto, concreto, strategico. Non sei un chatbot generico. Conosci il progetto nei dettagli. Dai consigli pratici, non teorici. Usi un tono professionale ma informale, come un collega senior. Rispondi in italiano. Sei conciso — max 150 parole a risposta salvo richieste di analisi approfondite. Non usi elenchi puntati eccessivi — preferisci frasi dirette.`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: history.slice(-10)
      })
    });

    const data = await res.json();
    showTyping(false);

    if(res.ok && data.content?.[0]?.text){
      addMsg('ad', data.content[0].text);
    } else {
      addMsg('ad', 'Errore nella risposta. Riprova.');
    }
  }catch(e){
    showTyping(false);
    addMsg('ad', 'Errore di connessione. Controlla la tua rete e riprova.');
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
