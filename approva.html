<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valore Atteso — Approva edizione</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F4EE;--cream2:#EDE9E0;--ink:#111010;--ink2:#3D3C39;--ink3:#888480;--rule:#C8C4BB;--green:#1A3A2A;--gpal:#E8F0EB;--red:#B5221A;--dp:'Playfair Display',Georgia,serif;--sf:'Source Serif 4',Georgia,serif;--mn:'JetBrains Mono',monospace}
body{background:var(--cream);color:var(--ink);font-family:var(--sf);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased}
.box{max-width:520px;width:100%;text-align:center}
.logo{font-family:var(--dp);font-size:1.8rem;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.tag{font-family:var(--mn);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--rule)}
.icon{font-size:40px;margin-bottom:16px}
.title{font-family:var(--dp);font-size:1.6rem;font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:12px}
.desc{font-family:var(--sf);font-size:15px;color:var(--ink2);font-weight:300;line-height:1.75;margin-bottom:28px}
.btn{display:inline-block;background:var(--ink);color:var(--cream);padding:14px 32px;font-family:var(--mn);font-size:11px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:3px;border:none;cursor:pointer;transition:background .15s;margin-bottom:12px;width:100%}
.btn:hover{background:var(--ink2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--ink3);border:1px solid var(--rule)}
.btn-sec:hover{background:var(--cream2);color:var(--ink)}
.loading{font-family:var(--mn);font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase}
.edition-preview{border:1px solid var(--rule);background:var(--cream2);padding:20px;margin-bottom:24px;text-align:left}
.ep-num{font-family:var(--mn);font-size:9px;color:var(--red);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.ep-title{font-family:var(--dp);font-size:1.1rem;font-weight:700;margin-bottom:8px}
.ep-opener{font-family:var(--sf);font-size:13px;color:var(--ink2);font-weight:300;line-height:1.65;font-style:italic}
.ep-sections{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ep-tag{font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:3px 8px;border:1px solid var(--rule);background:var(--cream)}
.ok-box{background:var(--gpal);border-left:3px solid var(--green);padding:16px 20px;font-family:var(--mn);font-size:10px;color:var(--green);letter-spacing:.04em;line-height:1.7;margin-bottom:20px;text-align:left;display:none}
.err-box{background:rgba(181,34,26,.08);border-left:3px solid var(--red);padding:16px 20px;font-family:var(--mn);font-size:10px;color:var(--red);letter-spacing:.04em;line-height:1.7;margin-bottom:20px;text-align:left;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Valore Atteso</div>
  <div class="tag">Editoriale Agent · Approvazione</div>

  <div id="loading"><div class="loading">Caricamento bozza...</div></div>

  <div id="content" style="display:none">
    <div class="edition-preview" id="preview"></div>
    <div class="ok-box" id="ok-box"></div>
    <div class="err-box" id="err-box"></div>
    <button class="btn" id="approve-btn" onclick="approva()">✓ Approva e pubblica martedì →</button>
    <br>
    <a href="https://valore-atteso.vercel.app" style="font-family:var(--mn);font-size:9px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;text-decoration:none">← Torna al sito</a>
  </div>

  <div id="error" style="display:none">
    <div class="icon">✕</div>
    <h1 class="title">Link non valido.</h1>
    <p class="desc">Il link di approvazione è scaduto o non corretto.</p>
    <a href="https://valore-atteso.vercel.app" class="btn">Torna al sito →</a>
  </div>
</div>

<script>
const SURL = 'https://xxnmkiwnjpppfzrftvuv.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4bm1raXduanBwcGZ6cmZ0dnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTkwNTUsImV4cCI6MjA5MTk5NTA1NX0.2EePZNm_OCc9WscYSG7CL_mbFV6E8ifwV9sP2WxkUo4';

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const secret = params.get('secret');
let editionId = null;

async function init(){
  if(!token){ showError(); return; }
  try{
    const r = await fetch(SURL + '/rest/v1/editions?draft_token=eq.' + token + '&published=eq.false&select=*', {
      headers: { apikey: SKEY, Authorization: 'Bearer ' + SKEY }
    });
    const data = await r.json();
    if(!data?.length){ showError(); return; }
    const e = data[0];
    editionId = e.id;
    document.getElementById('preview').innerHTML = `
      <div class="ep-num">Edizione #${e.num} · ${e.date}</div>
      <div class="ep-title">${e.title}</div>
      <div class="ep-opener">${e.opener||''}</div>
      <div class="ep-sections">${(e.sections||[]).map(s=>'<span class="ep-tag">'+s.label+'</span>').join('')}</div>
    `;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }catch(e){
    showError();
  }
}

async function approva(){
  const btn = document.getElementById('approve-btn');
  btn.disabled = true;
  btn.textContent = 'Pubblicazione in corso…';
  try{
    const r = await fetch(SURL + '/rest/v1/editions?id=eq.' + editionId, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        apikey: SKEY,
        Authorization: 'Bearer ' + SKEY,
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({ published: true, draft_token: null })
    });
    if(r.ok){
      const ok = document.getElementById('ok-box');
      ok.style.display = 'block';
      ok.innerHTML = '✓ Edizione pubblicata sul sito.<br>Gli iscritti la riceveranno martedì mattina via Resend.';
      btn.style.display = 'none';
    } else {
      throw new Error('HTTP ' + r.status);
    }
  }catch(e){
    const err = document.getElementById('err-box');
    err.style.display = 'block';
    err.textContent = 'Errore: ' + e.message;
    btn.disabled = false;
    btn.textContent = '✓ Approva e pubblica martedì →';
  }
}

function showError(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
}

init();
</script>
</body>
</html>
