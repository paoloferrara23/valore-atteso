<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio — Valore Atteso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F2EB;--cream2:#EDE9E0;--ink:#1A1A1A;--ink2:#4A4845;--ink3:#9A9690;
  --rule:#D0CBC0;--red:#C8251D;--accent:#D4A017;
  --dp:'Playfair Display',Georgia,serif;
  --sf:'Source Serif 4',Georgia,serif;
  --mn:'JetBrains Mono',monospace;
}
body{background:var(--cream);color:var(--ink);font-family:var(--sf);-webkit-font-smoothing:antialiased}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--cream);border-bottom:1px solid var(--rule)}
.nav{max-width:1200px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--dp);font-size:1.1rem;font-weight:900;letter-spacing:-.5px;color:var(--ink);text-decoration:none}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-a{font-family:var(--mn);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-decoration:none;cursor:pointer;transition:color .15s}
.nav-a:hover,.nav-a.active{color:var(--ink)}
.nav-cta{background:var(--red);color:#fff;border:none;padding:8px 18px;font-family:var(--mn);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:3px;text-decoration:none}

/* MAIN */
.container{max-width:760px;margin:0 auto;padding:60px 24px}
.page-label{font-family:var(--mn);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.page-label::before{content:'';width:20px;height:1px;background:var(--red)}
.page-title{font-family:var(--dp);font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px}
.page-desc{font-family:var(--sf);font-size:16px;color:var(--ink2);font-weight:300;line-height:1.75;padding:20px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:40px}

/* LISTA EDIZIONI */
.ed-list{display:flex;flex-direction:column}
.ed-row{display:grid;grid-template-columns:70px 1fr auto;gap:20px;align-items:start;padding:24px 0;border-bottom:1px solid var(--rule);cursor:pointer;transition:all .12s;text-decoration:none;color:inherit;border-radius:4px}
.ed-row:hover{background:var(--cream2);padding:24px 12px;margin:0 -12px}
.ed-num{font-family:var(--mn);font-size:11px;color:var(--ink3);letter-spacing:.06em;padding-top:2px}
.ed-title{font-family:var(--dp);font-size:1.05rem;font-weight:700;line-height:1.25;margin-bottom:6px;letter-spacing:-.2px}
.ed-tags{display:flex;gap:6px;flex-wrap:wrap}
.ed-tag{font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:2px 8px;border:1px solid var(--rule)}
.ed-date{font-family:var(--mn);font-size:10px;color:var(--ink3);white-space:nowrap;padding-top:3px}
.ed-arrow{font-family:var(--mn);font-size:12px;color:var(--ink3);padding-top:2px}
.arch-empty{text-align:center;padding:80px 0;font-family:var(--sf);font-size:15px;color:var(--ink3);font-style:italic}
.arch-loading{text-align:center;padding:60px 0;font-family:var(--mn);font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase}

/* ARTICOLO */
.article{display:none}
.article.on{display:block}
.ed-list-wrap{display:block}
.ed-list-wrap.hidden{display:none}
.art-back{font-family:var(--mn);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin-bottom:36px;text-decoration:none;transition:color .15s}
.art-back::before{content:'←'}
.art-back:hover{color:var(--red)}
.art-num{font-family:var(--mn);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.art-title{font-family:var(--dp);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:12px}
.art-subtitle{font-family:var(--sf);font-size:16px;color:var(--ink2);font-weight:300;line-height:1.6;margin-bottom:16px}
.art-meta{display:flex;gap:16px;align-items:center;padding:14px 0;border-top:1px solid var(--rule);border-bottom:2px solid var(--ink);margin-bottom:28px;font-family:var(--mn);font-size:10px;color:var(--ink3);letter-spacing:.04em;flex-wrap:wrap}
.art-opener{font-family:var(--sf);font-size:16px;color:var(--ink2);font-weight:300;line-height:1.8;font-style:italic;padding:20px 24px;background:var(--cream2);border-left:3px solid var(--ink);margin-bottom:40px}
.art-sec{margin-bottom:52px;padding-bottom:52px;border-bottom:1px solid var(--rule)}
.art-sec:last-child{border-bottom:none}
.art-sec-tag{font-family:var(--mn);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.art-sec-tag::before{content:'';width:20px;height:1px;background:var(--red)}
.art-sec-title{font-family:var(--dp);font-size:1.5rem;font-weight:700;line-height:1.2;letter-spacing:-.4px;margin-bottom:18px}
.art-body{font-family:var(--sf);font-size:16px;color:var(--ink2);font-weight:300;line-height:1.85;margin-bottom:22px;white-space:pre-line}
.kpi-table{width:100%;border-collapse:collapse;font-family:var(--mn);font-size:11px;margin-bottom:16px;background:var(--cream2)}
.kpi-table tr{border-bottom:1px solid var(--rule)}
.kpi-table tr:last-child{border-bottom:none}
.kpi-table td{padding:8px 14px}
.kpi-table td:first-child{color:var(--ink);font-weight:500}
.kpi-table td:last-child{text-align:right;color:var(--ink2)}
.art-verdict{font-family:var(--mn);font-size:10px;color:var(--red);letter-spacing:.04em;display:flex;align-items:center;gap:8px;margin-top:16px}
.art-verdict::before{content:'→'}
.art-sources{font-family:var(--mn);font-size:9px;color:#1B4332;letter-spacing:.04em;line-height:1.7;padding:10px 14px;background:#E4EDE7;border-left:2px solid #1B4332;margin-top:8px}

/* FOOTER */
footer{border-top:1px solid var(--rule);padding:28px 24px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{font-family:var(--mn);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-decoration:none}
.footer-links a:hover{color:var(--ink)}

@media(max-width:600px){
  .ed-row{grid-template-columns:50px 1fr;gap:12px}
  .ed-date{display:none}
  .nav-links .nav-a{display:none}
}
</style>
</head>
<body>

<nav>
  <div class="nav">
    <a class="nav-logo" href="/">Valore Atteso</a>
    <div class="nav-links">
      <a class="nav-a active" href="/archivio.html">Archivio</a>
      <a class="nav-a" href="/glossario.html">Glossario</a>
      <a class="nav-a" href="/#about">About</a>
      <a class="nav-cta" href="/">Iscriviti gratis →</a>
    </div>
  </div>
</nav>

<div class="container">

  <!-- LISTA EDIZIONI -->
  <div class="ed-list-wrap" id="list-wrap">
    <div class="page-label">Tutte le edizioni</div>
    <h1 class="page-title">Archivio.</h1>
    <p class="page-desc">Ogni martedì un bilancio, un deal e una metrica del business del calcio europeo. Dati verificati, nessun filler.</p>
    <div class="ed-list" id="arch-list">
      <div class="arch-loading">Caricamento edizioni...</div>
    </div>
  </div>

  <!-- ARTICOLO SINGOLO -->
  <div class="article" id="article-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:12px">
      <a class="art-back" onclick="backToList()">Torna all'archivio</a>
      <div id="art-edit-bar" style="display:none;gap:8px;align-items:center">
        <button onclick="toggleEdit()" id="btn-edit" style="padding:6px 16px;border:1px solid var(--rule);background:#fff;font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px">✎ Modifica</button>
        <button onclick="saveEdit()" id="btn-save" style="display:none;padding:6px 16px;background:var(--ink);color:#fff;border:none;font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px">Salva modifiche</button>
        <button onclick="cancelEdit()" id="btn-cancel" style="display:none;padding:6px 16px;border:1px solid var(--rule);background:#fff;font-family:var(--mn);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px">Annulla</button>
        <span id="edit-status" style="font-family:var(--mn);font-size:9px;color:var(--ink3)"></span>
      </div>
    </div>
    <div id="art-content"></div>
  </div>

</div>

<footer>
  <div class="footer-inner">
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/glossario.html">Glossario</a>
      <a href="/privacy.html">Privacy</a>
      <a href="mailto:info@valoreatteso.com">Contatti</a>
    </div>
  </div>
</footer>

<script>
const SURL = 'https://xxnmkiwnjpppfzrftvuv.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4bm1raXduanBwcGZ6cmZ0dnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTkwNTUsImV4cCI6MjA5MTk5NTA1NX0.2EePZNm_OCc9WscYSG7CL_mbFV6E8ifwV9sP2WxkUo4';

const CR_PWD = 'valopro2025';
let isAdmin = false;
let currentEditionId = null;
let currentEditionNum = null;
let isEditing = false;

function checkAdmin(){
  isAdmin = localStorage.getItem('va_admin') === 'yes';
  if(isAdmin) document.getElementById('art-edit-bar').style.display = 'flex';
}

function toggleEdit(){
  isEditing = !isEditing;
  document.getElementById('btn-edit').style.display = isEditing ? 'none' : 'block';
  document.getElementById('btn-save').style.display = isEditing ? 'block' : 'none';
  document.getElementById('btn-cancel').style.display = isEditing ? 'block' : 'none';

  // Rendi editabili i campi
  document.querySelectorAll('.edit-field').forEach(el => {
    el.contentEditable = isEditing ? 'true' : 'false';
    el.style.outline = isEditing ? '1px dashed var(--rule)' : 'none';
    el.style.padding = isEditing ? '4px' : '';
    el.style.background = isEditing ? '#fffde7' : '';
  });

  if(isEditing) document.getElementById('edit-status').textContent = 'Clicca sui testi per modificarli';
}

function cancelEdit(){
  isEditing = false;
  document.getElementById('btn-edit').style.display = 'block';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-cancel').style.display = 'none';
  document.getElementById('edit-status').textContent = '';
  // Ricarica originale
  if(currentEditionNum) openArt(currentEditionNum);
}

async function saveEdit(){
  const statusEl = document.getElementById('edit-status');
  const btnSave = document.getElementById('btn-save');
  btnSave.disabled = true;
  btnSave.textContent = 'Salvataggio...';

  try {
    // Raccogli le modifiche
    const titleEl = document.querySelector('.edit-title');
    const subtitleEl = document.querySelector('.edit-subtitle');
    const openerEl = document.querySelector('.edit-opener');
    const secEls = document.querySelectorAll('.edit-sec');

    const sections = Array.from(secEls).map((sec, i) => {
      const label = sec.querySelector('.edit-label')?.innerText.trim() || '';
      const title = sec.querySelector('.edit-sec-title')?.innerText.trim() || '';
      const body = sec.querySelector('.edit-sec-body')?.innerText.trim() || '';
      const verdict = sec.querySelector('.edit-verdict')?.innerText.replace(/^→\s*/,'').trim() || '';
      const sourcesEl = sec.querySelector('.edit-sources');
      const sources = sourcesEl ? sourcesEl.innerText.split('·').map(x=>x.replace(/^Fonti:\s*/,'').trim()).filter(Boolean) : [];
      const kpiRows = sec.querySelectorAll('.edit-kpi-row');
      const kpis = Array.from(kpiRows).map(row => ({
        key: row.querySelector('.edit-kpi-key')?.innerText.trim() || '',
        value: row.querySelector('.edit-kpi-val')?.innerText.trim() || ''
      }));
      return { label, title, body, verdict, sources, kpis };
    });

    const payload = {
      title: titleEl?.innerText.trim() || '',
      subtitle: subtitleEl?.innerText.trim() || '',
      opener: openerEl?.innerText.trim() || '',
      sections
    };

    const r = await fetch(SURL + '/rest/v1/editions?id=eq.' + currentEditionId, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json', apikey:SKEY, Authorization:'Bearer '+SKEY},
      body: JSON.stringify(payload)
    });

    if(!r.ok) throw new Error('HTTP ' + r.status);

    statusEl.textContent = '✓ Salvato';
    statusEl.style.color = '#1B4332';
    isEditing = false;
    document.getElementById('btn-edit').style.display = 'block';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
    document.querySelectorAll('.edit-field').forEach(el => {
      el.contentEditable = 'false';
      el.style.outline = 'none';
      el.style.padding = '';
      el.style.background = '';
    });
    setTimeout(() => { statusEl.textContent = ''; }, 3000);

  } catch(e) {
    statusEl.textContent = 'Errore: ' + e.message;
    statusEl.style.color = 'var(--red)';
  } finally {
    btnSave.disabled = false;
    btnSave.textContent = 'Salva modifiche';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sfetch(url){
  const r = await fetch(SURL+url, {headers:{apikey:SKEY,Authorization:'Bearer '+SKEY}});
  return r.json();
}

async function loadList(){
  const el = document.getElementById('arch-list');
  try {
    const eds = await sfetch('/rest/v1/editions?select=*&order=num.desc&published=eq.true');
    if(!eds||!eds.length){
      el.innerHTML = '<div class="arch-empty">Prima edizione in arrivo martedì.<br>Iscriviti per non perderla.</div>';
      return;
    }
    el.innerHTML = eds.map(e => `
      <div class="ed-row" onclick="openArt('${esc(e.num)}')">
        <div class="ed-num">#${esc(e.num)}</div>
        <div>
          <div class="ed-title">${esc(e.title)}</div>
          <div class="ed-tags">${(e.tags||[]).map(t=>'<span class="ed-tag">'+esc(t)+'</span>').join('')}</div>
        </div>
        <div class="ed-date">${esc(e.date)}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="arch-empty">Errore nel caricamento. Riprova.</div>';
  }
}

async function openArt(num){
  document.getElementById('list-wrap').classList.add('hidden');
  document.getElementById('article-wrap').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  currentEditionNum = num;
  isEditing = false;
  if(isAdmin){
    document.getElementById('art-edit-bar').style.display = 'flex';
    document.getElementById('btn-edit').style.display = 'block';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('edit-status').textContent = '';
  }
  const el = document.getElementById('art-content');
  el.innerHTML = '<div class="arch-loading">Caricamento edizione...</div>';
  try {
    const eds = await sfetch('/rest/v1/editions?num=eq.'+num+'&published=eq.true&select=*');
    const e = eds&&eds[0];
    if(!e){el.innerHTML='<p>Edizione non trovata.</p>';return;}
    currentEditionId = e.id;
    const secs = e.sections||[];
    el.innerHTML = `
      <div class="art-num">Edizione #${esc(e.num)}</div>
      <h1 class="art-title edit-field edit-title" contenteditable="false">${esc(e.title)}</h1>
      ${e.subtitle?`<p class="art-subtitle edit-field edit-subtitle" contenteditable="false">${esc(e.subtitle)}</p>`:''}
      <div class="art-meta">
        <span>${esc(e.date)}</span>
        ${(e.tags||[]).map(t=>`<span>· ${esc(t)}</span>`).join('')}
      </div>
      ${e.opener?`<div class="art-opener edit-field edit-opener" contenteditable="false">${esc(e.opener)}</div>`:''}
      ${secs.map(s=>`
        <div class="art-sec edit-sec">
          <div class="art-sec-tag edit-field edit-label" contenteditable="false">${esc(s.label)}</div>
          <h2 class="art-sec-title edit-field edit-sec-title" contenteditable="false">${esc(s.title)}</h2>
          <div class="art-body edit-field edit-sec-body" contenteditable="false" style="white-space:pre-line">${esc(s.body||'')}</div>
          ${s.kpis&&s.kpis.length?`
          <table class="kpi-table">
            ${s.kpis.map(k=>`<tr class="edit-kpi-row"><td class="edit-field edit-kpi-key" contenteditable="false">${esc(k.key)}</td><td class="edit-field edit-kpi-val" contenteditable="false" style="text-align:right">${esc(k.value)}</td></tr>`).join('')}
          </table>`:''}
          ${s.verdict?`<div class="art-verdict edit-field edit-verdict" contenteditable="false">${esc(s.verdict)}</div>`:''}
          ${s.sources&&s.sources.length?`<div class="art-sources edit-field edit-sources" contenteditable="false">Fonti: ${s.sources.join(' · ')}</div>`:''}
        </div>`).join('')}
      <div class="art-cta">
        <p>Ricevi ogni edizione il martedì mattina</p>
        <a href="/" style="display:inline-block;padding:10px 24px;background:#C8251D;color:#fff;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;border-radius:3px">Iscriviti gratis →</a>
      </div>`;
  } catch(e) {
    el.innerHTML = '<p>Errore nel caricamento.</p>';
  }
}

function backToList(){
  document.getElementById('article-wrap').classList.remove('on');
  document.getElementById('list-wrap').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

loadList();

// Admin login nascosto — premi Alt+A per attivare modifica
document.addEventListener('keydown', function(e){
  if(e.altKey && e.key === 'a'){
    if(isAdmin){
      isAdmin = false;
      localStorage.removeItem('va_admin');
      document.getElementById('art-edit-bar').style.display = 'none';
      alert('Modalità admin disattivata.');
    } else {
      const pwd = prompt('Password admin:');
      if(pwd === CR_PWD){
        isAdmin = true;
        localStorage.setItem('va_admin','yes');
        document.getElementById('art-edit-bar').style.display = 'flex';
        alert('Modalità admin attivata. Apri una newsletter per modificarla.');
      } else if(pwd !== null) {
        alert('Password errata.');
      }
    }
  }
});

checkAdmin();
</script>
</body>
</html>
